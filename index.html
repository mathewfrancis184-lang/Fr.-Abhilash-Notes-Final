<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Preaching Notes</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0056b3">
    
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --bg-color: #f4f6f8;
            --card-bg: #ffffff;
            --text-main: #212529;
            --text-muted: #6c757d;
            --accent: #0056b3;
            --accent-hover: #004494;
            --danger: #dc3545;
            --success: #28a745;
            --border: #dee2e6;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #121212;
                --card-bg: #1e1e1e;
                --text-main: #e0e0e0;
                --text-muted: #a0a0a0;
                --accent: #4da3ff;
                --accent-hover: #338cf0;
                --danger: #cf6679;
                --success: #4ade80;
                --border: #333333;
            }
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            width: 100%;
            max-width: 800px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 2px solid var(--border);
            padding-bottom: 15px;
        }

        h1 { margin: 0; font-size: 1.4rem; }
        h2, h3 { margin-top: 0; }

        .btn {
            padding: 12px 18px; 
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 1rem;
            transition: background-color 0.2s;
        }

        .btn-primary { background-color: var(--accent); color: white; }
        .btn-success { background-color: var(--success); color: white; }
        .btn-danger { background-color: var(--danger); color: white; }
        .btn-small { padding: 8px 12px; font-size: 0.85rem; }

        main { width: 100%; max-width: 800px; }
        .hidden { display: none !important; }

        /* --- PREACHING VIEW STYLES --- */
        details.topic-container {
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            overflow: hidden;
        }

        summary.topic-header {
            background-color: var(--accent);
            color: white;
            padding: 15px;
            font-size: 1.3rem;
            font-weight: bold;
            margin: 0;
            cursor: pointer;
            list-style: none;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        summary.topic-header::-webkit-details-marker { display: none; }
        summary.topic-header::after {
            content: '▼';
            font-size: 0.9rem;
            transition: transform 0.2s;
        }
        details.topic-container[open] summary.topic-header::after {
            content: '▲';
        }

        details.note {
            border-top: 1px solid var(--border);
        }

        summary.note-title {
            font-size: 1.25rem;
            font-weight: 600;
            cursor: pointer;
            padding: 18px 15px;
            list-style: none;
            display: flex;
            align-items: center;
        }
        
        summary.note-title::-webkit-details-marker { display: none; }
        summary.note-title::before {
            content: '▶';
            font-size: 0.9rem;
            margin-right: 12px;
            color: var(--accent);
            transition: transform 0.2s;
        }
        details.note[open] summary.note-title::before { content: '▼'; }
        details.note[open] summary.note-title { background-color: rgba(0,0,0,0.03); }

        .note-content {
            font-size: 1.15rem;
            line-height: 1.6;
            white-space: pre-wrap;
            padding: 0 15px 20px 40px;
            color: var(--text-main);
        }

        /* --- ADMIN PANEL STYLES --- */
        .admin-panel {
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 25px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .form-group { margin-bottom: 18px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 0.95rem; }

        input[type="text"], select, textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background-color: var(--bg-color);
            color: var(--text-main);
            box-sizing: border-box;
            font-size: 1rem;
        }

        textarea { resize: vertical; min-height: 120px; }

        .admin-list-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
            margin-bottom: 10px;
            background: var(--bg-color);
        }

        #loading-indicator {
            text-align: center;
            padding: 20px;
            font-size: 1.1rem;
            color: var(--text-muted);
        }
    </style>
</head>
<body>

    <header>
        <h1 id="view-title">Preaching Mode</h1>
        <button id="toggle-admin-btn" class="btn btn-primary" onclick="toggleView()">Admin Panel</button>
    </header>

    <main>
        <div id="preaching-section">
            <div id="loading-indicator">Loading your notes securely from the cloud...</div>
            <div id="topics-container"></div>
        </div>

        <div id="admin-section" class="hidden">
            
            <div class="admin-panel">
                <h3>📁 Manage Topics</h3>
                <div class="form-group" style="display:flex; gap:10px;">
                    <input type="text" id="new-topic-name" placeholder="New Topic Name (e.g., Sunday Mass)">
                    <button class="btn btn-success" onclick="addTopic()">Add Topic</button>
                </div>
                <div id="admin-topics-list"></div>
            </div>

            <div class="admin-panel">
                <h3>📝 Add New Preaching Note</h3>
                <div class="form-group">
                    <label for="topic-select">Select Topic</label>
                    <select id="topic-select"></select>
                </div>
                <div class="form-group">
                    <label for="main-point">Main Point / Heading</label>
                    <input type="text" id="main-point" placeholder="e.g., 1. The Power of Grace">
                </div>
                <div class="form-group">
                    <label for="sub-points">Detailed Content</label>
                    <textarea id="sub-points" placeholder="Type sermon details here."></textarea>
                </div>
                <button class="btn
